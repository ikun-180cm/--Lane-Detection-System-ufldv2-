<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忘记密码</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
body{
    background:url("/static/bg-cangqiong.jpg") no-repeat center center fixed;
    background-size:cover;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:20px;
}
.forget-box{
    width:100%;max-width:420px;
    padding:40px;
    background:rgba(10,15,30,0.4);
    backdrop-filter:blur(13px);
    border-radius:22px;
    color:#87CEFA;
    text-align:center;
}
h2{margin-bottom:30px;}
input{
    width:100%;
    padding:14px;
    margin:10px 0;
    background:rgba(10,15,30,0.3);
    border:1px solid rgba(10,15,30,0.4);
    border-radius:10px;
    color:#87CEFA; /* 输入文字颜色 */
    font-size:15px;
    transition:all 0.3s ease;
}
/* 新增：placeholder 文字颜色 */
input::placeholder{
    color:#87CEFA;
    opacity:1; /* 确保颜色不透明 */
}
input:focus{
    outline:none;
    border-color:#87CEFA;
    box-shadow:0 0 8px rgba(137,207,250,0.3);
}
.btn{
    width:100%;
    padding:14px;
    margin:15px 0;
    background:rgba(10,15,30,0.4);
    border:1px solid rgba(10,15,30,0.4);
    border-radius:10px;
    color:#87CEFA;
    font-size:16px;
    cursor:pointer;
    transition:all 0.3s ease;
    position:relative;
    overflow:hidden;
}
.btn:hover{
    background:rgba(20,30,60,0.6);
    transform:translateY(-2px);
    box-shadow:0 6px 12px rgba(0,0,0.2);
    border-color:#87CEFA;
}
.btn:active{
    transform:translateY(0);
}
.btn::after{
    content:"";
    position:absolute;
    top:50%;left:50%;
    width:0;height:0;
    background:rgba(137,207,250,0.2);
    border-radius:50%;
    transform:translate(-50%,-50%);
    transition:width 0.6s ease,height 0.6s ease;
}
.btn:active::after{
    width:300px;height:300px;opacity:0;
}
a{
    color:#87CEFA;
    text-decoration:none;
    transition:all 0.3s ease;
}
a:hover{
    color:#fff;
    text-shadow:0 0 6px rgba(137,207,250,0.5);
}
.flash{
    padding:10px;
    background:rgba(10,15,30,0.3);
    border-radius:8px;
    margin-bottom:15px;
}
</style>
</head>
<body>
<div class="forget-box">
    <h2>重置密码</h2>
    {% with msgs = get_flashed_messages(with_categories=true) %}
    {% if msgs %}
        {% for c,m in msgs %}
            <div class="flash">{{m}}</div>
        {% endfor %}
    {% endif %}
    {% endwith %}
    <form method="post">
        <input type="text" name="username" placeholder="请输入用户名" required>
        <input type="password" name="password" placeholder="请输入新密码" required>
        <button class="btn" type="submit">确认重置</button>
    </form>
    <a href="/login">返回登录</a>
</div>
</body>
</html>
