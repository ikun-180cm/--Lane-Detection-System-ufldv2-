<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>检测结果</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family: "Microsoft YaHei",sans-serif;}
body{
    background:url("/static/bg-cangqiong.jpg") no-repeat center center fixed;
    background-size:cover;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:20px;
}
.box{
    width:100%;max-width:1200px;
    padding:40px;
    background: rgba(10, 15, 30, 0.40);
    backdrop-filter: blur(13px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(130%);
    border-radius:22px;
    color: #87CEFA;
    text-align:center;
}
.compare-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin: 30px 0;
    justify-content: center;
}
.file-card {
    flex: 1;
    min-width: 300px;
    max-width: 500px;
}
.file-card h3 {
    margin-bottom: 15px;
    font-size: 18px;
}
img, video {
    max-width: 100%;
    max-height: 500px;
    border-radius: 12px;
    border: 1px solid rgba(10, 15, 30, 0.40);
}
.file-info {
    margin: 10px 0;
    font-size: 14px;
    color: #b0c4de;
}
a{
    display:inline-block;
    margin:10px;
    padding:12px 24px;
    background: rgba(10, 15, 30, 0.40);
    border:1px solid rgba(10, 15, 30, 0.40);
    border-radius:12px;
    color: #87CEFA;
    text-decoration:none;
    transition:all 0.3s ease;
    position:relative;
    overflow:hidden;
}
a:hover{
    background:rgba(20,30,60,0.6);
    transform:translateY(-2px);
    box-shadow:0 6px 12px rgba(0,0,0,0.2);
    border-color:#87CEFA;
}
a:active{
    transform:translateY(0);
}
a::after{
    content:"";
    position:absolute;
    top:50%;left:50%;
    width:0;height:0;
    background:rgba(137,207,250,0.2);
    border-radius:50%;
    transform:translate(-50%,-50%);
    transition:width 0.6s ease,height 0.6s ease;
}
a:active::after{
    width:300px;height:300px;opacity:0;
}
</style>
</head>
<body>
<div class="box">
    <h2>✅ 检测完成</h2>
    <div class="file-info">
        <p>原始文件名：{{ original_filename }}</p>
        <p>结果文件名：{{ filename }}</p>
    </div>

    <div class="compare-container">
        <div class="file-card">
            <h3>📁 原始文件</h3>
            {% if original_type == 'image' %}
                <img src="{{ original_url }}" alt="原始图片">
            {% elif original_type == 'video' %}
                <video controls>
                    <source src="{{ original_url }}">
                    浏览器不支持视频播放
                </video>
            {% else %}
                <p>不支持预览</p>
            {% endif %}
        </div>

        <div class="file-card">
            <h3>🎯 检测后文件</h3>
            {% if result_type == 'image' %}
                <img src="{{ result_url }}" alt="检测结果">
            {% elif result_type == 'video' %}
                <video controls>
                    <source src="{{ result_url }}">
                    浏览器不支持视频播放
                </video>
            {% else %}
                <p>不支持预览</p>
            {% endif %}
        </div>
    </div>

    <a href="/">返回首页</a>
    <a href="/history">查看记录</a>
</div>
</body>
</html>
