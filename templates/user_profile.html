<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人资料</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto}
body{
    background:url("{{ url_for('static',filename='bg-cangqiong.jpg') }}") no-repeat center center fixed;
    background-size:cover;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px
}
.card{
    background:rgba(10, 15, 30, 0.40);backdrop-filter:blur(10px);
    border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 8px 30px rgba(0,0,0,0.1)
}
.title{text-align:center;font-size:24px;margin-bottom:30px}
input,select{
    width:100%;padding:14px;margin:10px 0;
    border:1px solid #ddd;border-radius:12px;font-size:16px
}
button{
    width:100%;padding:14px;margin-top:10px;
    border:none;border-radius:12px;background:linear-gradient(90deg,#FBBC05,#F29C0F);
    color:#fff;font-size:16px;cursor:pointer
}
a{display:block;text-align:center;margin-top:20px;text-decoration:none;color:#4285F4}
</style>
</head>
<body>
<div class="card">
    <div class="title">修改头像/性别</div>
    <form method="post" enctype="multipart/form-data">
        <input type="file" name="avatar">
        <select name="gender">
            <option {% if profile[1]=='男' %}selected{% endif %}>男</option>
            <option {% if profile[1]=='女' %}selected{% endif %}>女</option>
            <option {% if profile[1]=='未知' %}selected{% endif %}>未知</option>
        </select>
        <button type="submit">保存</button>
    </form>
    <a href="/">返回首页</a>
</div>
</body>
</html>
