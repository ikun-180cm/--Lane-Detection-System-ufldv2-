<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件上传</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
body{
    background:url("/static/bg-cangqiong.jpg") no-repeat center center fixed;
    background-size:cover;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:20px;
}
.upload-box{
    width:100%;max-width:600px;
    padding:40px;
    background:rgba(10,15,30,0.4);
    backdrop-filter:blur(13px);
    border-radius:22px;
    color:#87CEFA;
    text-align:center;
}
h2{margin-bottom:30px;}
.upload-area{
    border:2px dashed rgba(137,207,250,0.4);
    border-radius:16px;
    padding:20px;
    margin:20px 0;
    min-height:300px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    transition:all 0.3s ease;
    position:relative;
}
.upload-area:hover{
    border-color:#87CEFA;
    background:rgba(10,15,30,0.2);
}
input[type="file"]{
    display:none;
}
.file-label{
    display:inline-block;
    padding:12px 24px;
    background:rgba(10,15,30,0.4);
    border-radius:10px;
    cursor:pointer;
    transition:all 0.3s ease;
}
.file-label:hover{
    background:rgba(20,30,60,0.6);
    transform:scale(1.05);
}
.tips{margin-top:15px;font-size:14px;opacity:0.8;}
.btn{
    padding:14px 30px;
    margin:15px 8px;
    background:rgba(10,15,30,0.4);
    border:1px solid rgba(10,15,30,0.4);
    border-radius:10px;
    color:#87CEFA;
    font-size:16px;
    cursor:pointer;
    transition:all 0.3s ease;
    position:relative;
    overflow:hidden;
}
.btn:hover{
    background:rgba(20,30,60,0.6);
    transform:translateY(-2px);
    box-shadow:0 6px 12px rgba(0,0,0,0.2);
    border-color:#87CEFA;
}
.btn:active{
    transform:translateY(0);
}
.btn::after{
    content:"";
    position:absolute;
    top:50%;left:50%;
    width:0;height:0;
    background:rgba(137,207,250,0.2);
    border-radius:50%;
    transform:translate(-50%,-50%);
    transition:width 0.6s ease,height 0.6s ease;
}
.btn:active::after{
    width:300px;height:300px;opacity:0;
}
a{
    color:#87CEFA;
    text-decoration:none;
    transition:all 0.3s ease;
}
a:hover{
    color:#fff;
    text-shadow:0 0 6px rgba(137,207,250,0.5);
}
/* 进度条样式 */
.progress-wrap {
    width: 100%;
    height: 20px;
    background: rgba(10,15,30,0.3);
    border-radius: 10px;
    margin: 20px 0;
    overflow: hidden;
    display: none;
}
.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #87CEFA, #00BFFF);
    transition: width 0.3s ease-in-out;
}
.progress-text {
    margin: 10px 0;
    display: none;
}
/* 预览图/视频样式 */
.preview-container {
    display: none;
    width: 100%;
    height: 100%;
    align-items: center;
    justify-content: center;
}
.preview-container img,
.preview-container video {
    max-width: 100%;
    max-height: 280px;
    border-radius: 8px;
}
.placeholder-content {
    display: flex;
    flex-direction: column;
    align-items: center;
}
</style>
</head>
<body>
<div class="upload-box">
    <h2>上传文件进行车道检测</h2>
    <form id="uploadForm" method="post" enctype="multipart/form-data">
        <div class="upload-area">
            <!-- 默认占位内容 -->
            <div class="placeholder-content" id="placeholderContent">
                <label class="file-label" for="file">选择图片/视频文件</label>
                <p class="tips">支持 png / jpg / mp4 / avi / mov 等格式</p>
            </div>

            <!-- 预览容器（选择文件后显示） -->
            <div class="preview-container" id="previewContainer">
                <img id="previewImage" style="display: none;">
                <video id="previewVideo" controls style="display: none;"></video>
            </div>

            <input type="file" id="file" name="file" accept=".png,.jpg,.jpeg,.mp4,.avi,.mov,.mkv,.flv,.wmv,.webm" required>
        </div>

        <!-- 进度条区域 -->
        <div class="progress-text" id="progressText">正在上传与推理，请稍候...</div>
        <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <button class="btn" type="submit">开始检测</button>
        <a href="/history" class="btn">查看历史记录</a>
        <br>
        <a href="/">返回首页</a>
    </form>
</div>

<script>
const fileInput = document.getElementById('file');
const placeholderContent = document.getElementById('placeholderContent');
const previewContainer = document.getElementById('previewContainer');
const previewImage = document.getElementById('previewImage');
const previewVideo = document.getElementById('previewVideo');

// 文件选择后实时预览
fileInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const fileType = file.type;
    const reader = new FileReader();

    // 清空之前的预览
    previewImage.style.display = 'none';
    previewVideo.style.display = 'none';

    if (fileType.startsWith('image/')) {
        // 图片预览
        reader.onload = function(e) {
            previewImage.src = e.target.result;
            previewImage.style.display = 'block';
            previewContainer.style.display = 'flex';
            placeholderContent.style.display = 'none';
        };
        reader.readAsDataURL(file);
    } else if (fileType.startsWith('video/')) {
        // 视频预览
        const url = URL.createObjectURL(file);
        previewVideo.src = url;
        previewVideo.style.display = 'block';
        previewContainer.style.display = 'flex';
        placeholderContent.style.display = 'none';
    }
});

// 上传进度逻辑
const form = document.getElementById('uploadForm');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');

form.addEventListener('submit', function(e) {
    progressWrap.style.display = 'block';
    progressText.style.display = 'block';
    progressBar.style.width = '0%';

    let progress = 0;
    const timer = setInterval(() => {
        progress += Math.floor(Math.random() * 3) + 1;
        if (progress >= 95) {
            progress = 95;
            clearInterval(timer);
        }
        progressBar.style.width = progress + '%';
    }, 200);
});
</script>
</body>
</html>
